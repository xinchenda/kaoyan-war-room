name: Sync exam intelligence

on:
  schedule:
    - cron: "20 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: exam-intelligence
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - id: intelligence
        continue-on-error: true
        run: npm run sync:intel
      - name: Commit fresh intelligence
        if: always()
        run: |
          if git diff --quiet -- data/updates.json data/updates.js; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/updates.json data/updates.js
          git commit -m "chore: refresh exam intelligence"
          git push || (git pull --rebase origin main && git push)
      - name: Enforce official source health
        if: steps.intelligence.outcome != 'success'
        run: exit 1
